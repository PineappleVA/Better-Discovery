<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Discovery – Discover HTML Creations</title>
  <meta name="description" content="Share and discover interactive HTML creations. Upload your HTML, let others view, like and comment — no programming required.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Navigation ── -->
  <nav>
    <a href="index.html" class="nav-logo">🚀 Better Discovery</a>
    <div class="nav-links">
      <a href="index.html" class="active">Browse</a>
      <a href="about.html">About</a>
      <a href="upload.html" class="btn btn-primary">+ Upload</a>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <section class="hero">
    <h1>Discover HTML Creations</h1>
    <p>Upload your HTML projects and let anyone view, interact, like and comment — no coding needed.</p>
    <a href="upload.html" class="btn btn-primary" style="font-size:1rem;padding:12px 30px;">Share Your HTML ✨</a>
  </section>

  <!-- ── Main content ── -->
  <div class="container">

    <!-- Search -->
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="search" placeholder="Search creations by title or description…" autocomplete="off">
    </div>

    <!-- Section header -->
    <div class="section-header">
      <h2 class="section-title">✨ Latest Creations</h2>
      <select id="sortSelect" class="sort-select" aria-label="Sort by">
        <option value="created_at">Newest first</option>
        <option value="likes">Most liked</option>
      </select>
    </div>

    <!-- Grid -->
    <div id="grid" class="snippets-grid">
      <div class="loading"><div class="spinner"></div>Loading…</div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="pagination"></div>

  </div>

  <!-- ── Scripts ── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const PER_PAGE = 12;
    let page  = 0;
    let total = 0;
    let query = '';
    let sort  = 'created_at';

    /* ── Render a card ── */
    function renderCard(s) {
      return `
        <a href="view.html?id=${encodeURIComponent(s.id)}" class="snippet-card">
          <div class="card-thumb">🌐</div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(s.title)}</div>
            <div class="card-desc">${escapeHtml(s.description || 'No description provided.')}</div>
            <div class="card-footer">
              <span class="card-author">by ${escapeHtml(s.author || 'Anonymous')}</span>
              <div class="card-stats">
                <span>❤️ ${s.likes ?? 0}</span>
                <span>🕐 ${timeAgo(s.created_at)}</span>
              </div>
            </div>
          </div>
        </a>`;
    }

    /* ── Load snippets ── */
    async function loadSnippets() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading…</div>';

      if (!supabaseClient) {
        grid.innerHTML = configNoticeHtml();
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      try {
        let q = supabaseClient
          .from('snippets')
          .select('id, title, description, author, created_at, likes', { count: 'exact' })
          .order(sort, { ascending: false })
          .range(page * PER_PAGE, (page + 1) * PER_PAGE - 1);

        if (query) {
          q = q.or(`title.ilike.%${query}%,description.ilike.%${query}%`);
        }

        const { data, error, count } = await q;
        if (error) throw error;

        total = count ?? 0;

        if (!data || data.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div style="font-size:3rem;margin-bottom:14px">🎨</div>
              <h3>${query ? 'No results found' : 'No creations yet'}</h3>
              <p>${query ? 'Try a different search term.' : 'Be the first to share something!'}</p>
              <a href="upload.html" class="btn btn-primary" style="margin-top:18px;display:inline-flex">+ Upload HTML</a>
            </div>`;
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        grid.innerHTML = data.map(renderCard).join('');
        renderPagination();

      } catch (err) {
        grid.innerHTML = `
          <div class="empty-state">
            <div style="font-size:2.5rem;margin-bottom:12px">⚠️</div>
            <h3>Something went wrong</h3>
            <p style="max-width:360px;margin:0 auto">${escapeHtml(err.message)}</p>
          </div>`;
      }
    }

    /* ── Pagination ── */
    function renderPagination() {
      const pages = Math.ceil(total / PER_PAGE);
      const el    = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }

      const parts = [];
      if (page > 0) parts.push(`<button class="page-btn" onclick="goPage(${page - 1})">← Prev</button>`);

      const start = Math.max(0, page - 2);
      const end   = Math.min(pages - 1, page + 2);
      if (start > 0) parts.push(`<button class="page-btn" onclick="goPage(0)">1</button><span style="color:var(--text-muted);padding:0 4px">…</span>`);

      for (let i = start; i <= end; i++) {
        parts.push(`<button class="page-btn ${i === page ? 'active' : ''}" onclick="goPage(${i})">${i + 1}</button>`);
      }

      if (end < pages - 1) parts.push(`<span style="color:var(--text-muted);padding:0 4px">…</span><button class="page-btn" onclick="goPage(${pages - 1})">${pages}</button>`);
      if (page < pages - 1) parts.push(`<button class="page-btn" onclick="goPage(${page + 1})">Next →</button>`);

      el.innerHTML = parts.join('');
    }

    function goPage(p) {
      page = p;
      loadSnippets();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ── Event listeners ── */
    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        query = e.target.value.trim();
        page  = 0;
        loadSnippets();
      }, 380);
    });

    document.getElementById('sortSelect').addEventListener('change', e => {
      sort = e.target.value;
      page = 0;
      loadSnippets();
    });

    loadSnippets();
  </script>
</body>
</html>
