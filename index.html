<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Discovery</title>
  <meta name="description" content="Comparte y descubre creaciones HTML interactivas. Sube tu HTML y deja que otros lo vean, den like y comenten.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="/index.html" class="nav-logo">🚀 Better Discovery</a>
    <div class="nav-links">
      <a href="/index.html" class="active">Explorar</a>
      <a href="/docs/about.html">Acerca de</a>
      <a href="/upload.html" class="btn btn-primary">+ Subir</a>
    </div>
    <div class="nav-auth" id="navAuth"></div>
  </nav>
  <section class="hero">
    <h1>Descubre creaciones HTML</h1>
    <p>Sube tus proyectos HTML y deja que cualquiera los vea, interactúe, reaccione y comente — sin programar.</p>
    <a href="/upload.html" class="btn btn-primary" id="heroUploadBtn" style="font-size:1rem;padding:13px 32px">Comparte tu HTML ✨</a>
  </section>
  <div class="container">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="search" placeholder="Busca por título o descripción…" autocomplete="off">
    </div>
    <div class="section-header">
      <h2 class="section-title">✨ Últimas creaciones</h2>
      <select id="sortSelect" class="sort-select" aria-label="Ordenar por">
        <option value="created_at">Más recientes</option>
        <option value="likes">Más valoradas</option>
      </select>
    </div>
    <div id="grid" class="snippets-grid">
      <div class="loading"><div class="spinner"></div>Cargando…</div>
    </div>
    <div id="pagination" class="pagination"></div>
  </div>
  <footer class="site-footer">
    <a href="/docs/terms.html">Términos y condiciones</a>
    <span>·</span>
    <a href="/docs/privacy.html">Política de privacidad</a>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const PER_PAGE = 12;
    let page = 0;
    let total = 0;
    let query = '';
    let sort = 'created_at';
    function renderCard(s, idx) {
      const author = s.author || DEFAULT_AUTHOR_NAME;
      return `
        <a href="/view.html?id=${encodeURIComponent(s.id)}" class="snippet-card reveal" style="--i:${idx % 8}">
          <div class="card-thumb">🌐</div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(s.title)}</div>
            <div class="card-desc">${escapeHtml(s.description || 'Sin descripción disponible.')}</div>
            <div class="card-footer">
              <span class="card-author">
                <span class="profile-dot">${escapeHtml(getProfileInitial(author))}</span>
                ${escapeHtml(author)}
              </span>
              <div class="card-stats">
                <span>❤️ ${s.likes ?? 0}</span>
                <span>🕐 ${timeAgo(s.created_at)}</span>
              </div>
            </div>
          </div>
        </a>`;
    }
    async function loadSnippets() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando…</div>';
      if (!supabaseClient) {
        grid.innerHTML = configNoticeHtml();
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      try {
        let q = supabaseClient
          .from('snippets')
          .select('id, title, description, author, created_at, likes', { count: 'exact' })
          .order(sort, { ascending: false })
          .range(page * PER_PAGE, (page + 1) * PER_PAGE - 1);
        if (query) {
          q = q.or(`title.ilike.%${query}%,description.ilike.%${query}%`);
        }
        const { data, error, count } = await q;
        if (error) throw error;
        total = count ?? 0;
        if (!data || data.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div style="font-size:3rem;margin-bottom:14px">🎨</div>
              <h3>${query ? 'No se encontraron resultados' : 'Aún no hay creaciones'}</h3>
              <p>${query ? 'Prueba con otra búsqueda.' : '¡Comparte algo y abre la galería!'}</p>
              <a href="/upload.html" class="btn btn-primary" style="margin-top:18px;display:inline-flex">+ Subir HTML</a>
            </div>`;
          document.getElementById('pagination').innerHTML = '';
          return;
        }
        grid.innerHTML = data.map((item, idx) => renderCard(item, idx)).join('');
        renderPagination();
      } catch (err) {
        grid.innerHTML = `
          <div class="empty-state">
            <div style="font-size:2.5rem;margin-bottom:12px">⚠️</div>
            <h3>Algo salió mal</h3>
            <p style="max-width:360px;margin:0 auto">No se pudo cargar la galería en este momento. Inténtalo de nuevo más tarde.</p>
          </div>`;
      }
    }
    function renderPagination() {
      const pages = Math.ceil(total / PER_PAGE);
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      const parts = [];
      if (page > 0) parts.push(`<button class="page-btn" onclick="goPage(${page - 1})">← Anterior</button>`);
      const start = Math.max(0, page - 2);
      const end = Math.min(pages - 1, page + 2);
      if (start > 0) parts.push(`<button class="page-btn" onclick="goPage(0)">1</button><span style="color:var(--text-muted);padding:0 4px">…</span>`);
      for (let i = start; i <= end; i++) {
        parts.push(`<button class="page-btn ${i === page ? 'active' : ''}" onclick="goPage(${i})">${i + 1}</button>`);
      }
      if (end < pages - 1) parts.push(`<span style="color:var(--text-muted);padding:0 4px">…</span><button class="page-btn" onclick="goPage(${pages - 1})">${pages}</button>`);
      if (page < pages - 1) parts.push(`<button class="page-btn" onclick="goPage(${page + 1})">Siguiente →</button>`);
      el.innerHTML = parts.join('');
    }
    function goPage(p) {
      page = p;
      loadSnippets();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        query = e.target.value.trim();
        page = 0;
        loadSnippets();
      }, 380);
    });
    document.getElementById('sortSelect').addEventListener('change', e => {
      sort = e.target.value;
      page = 0;
      loadSnippets();
    });
    async function initPage() {
      await requireAuth({ redirect: false });
      await renderAuthNav();
      const session = await getSession();
      const heroBtn = document.getElementById('heroUploadBtn');
      if (heroBtn && !session) {
        heroBtn.addEventListener('click', e => {
          e.preventDefault();
          showToast('Inicia sesión para subir creaciones.', 'error');
          setTimeout(() => { window.location.href = 'login.html'; }, 600);
        });
      }
      loadSnippets();
    }
    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
