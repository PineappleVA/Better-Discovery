  - main [ref=f8e10]:
    - heading "Política de privacidad" [level=1] [ref=f8e11]
    - paragraph [ref=f8e12]: "Última actualización: 19 de junio de 2026."
    - paragraph [ref=f8e13]: Esta política describe qué datos puede tratar Better Discovery, por qué se usan y qué control tienes sobre ellos. El sitio utiliza servicios externos para autenticación, almacenamiento y distribución de contenido.
    - generic [ref=f8e14]:
      - heading "1. Datos que puedes compartir" [level=2] [ref=f8e15]
      - paragraph [ref=f8e16]: Según cómo uses la app, puedes proporcionar email de acceso, nombre público, biografía, creaciones HTML, comentarios, autores seguidos y preferencias guardadas en el navegador.
      - heading "2. Datos generados por el uso" [level=2] [ref=f8e17]
      - paragraph [ref=f8e18]: El sitio puede registrar información técnica necesaria para funcionar, como sesiones activas, identificadores internos, preferencias locales y el estado de elementos visibles de la interfaz. También puede almacenar metadatos de las creaciones para mostrar autor, fecha, likes y comentarios.
      - heading "3. Finalidad del tratamiento" [level=2] [ref=f8e19]
      - list [ref=f8e20]:
        - listitem [ref=f8e21]: Autenticar usuarios y mantener sesiones.
        - listitem [ref=f8e22]: Publicar y mostrar creaciones HTML.
        - listitem [ref=f8e23]: Guardar comentarios, likes y perfiles visibles.
        - listitem [ref=f8e24]: Permitir seguimiento entre personas usuarias y calcular el espacio usado.
        - listitem [ref=f8e25]: Mejorar la seguridad, moderación y experiencia de navegación.
      - heading "4. Conservación" [level=2] [ref=f8e26]
      - paragraph [ref=f8e27]: Conservamos el contenido mientras sea útil para prestar el servicio o hasta que se elimine según las reglas del proyecto o las capacidades de los sistemas externos usados. Parte de tu configuración se guarda localmente en tu navegador.
      - heading "5. Cookies y almacenamiento local" [level=2] [ref=f8e28]
      - paragraph [ref=f8e29]: Better Discovery puede usar almacenamiento local del navegador para recordar tu perfil público, a quién sigues, qué has marcado como propio y qué contenido has valorado. Puedes borrar estos datos desde la configuración de tu navegador.
      - heading "6. Terceros" [level=2] [ref=f8e30]
      - paragraph [ref=f8e31]: El sitio utiliza servicios de terceros como Supabase. Cada proveedor puede tratar datos de acuerdo con sus propias políticas y condiciones. Te recomendamos revisar la documentación de dichos servicios.
      - heading "7. Tus derechos" [level=2] [ref=f8e32]
      - paragraph [ref=f8e33]: Puedes pedir acceso, corrección o eliminación de tu contenido cuando el diseño del sistema lo permita. También puedes dejar de usar la cuenta, limpiar el almacenamiento local o contactar con el proyecto para plantear una revisión.
      - heading "8. Seguridad" [level=2] [ref=f8e34]
      - paragraph [ref=f8e35]: El HTML de las creaciones se muestra dentro de iframes con sandbox para reducir el impacto de contenido no confiable. Aun así, ningún sistema puede garantizar seguridad absoluta, por lo que debes publicar contenido responsable.
      - heading "9. Menores" [level=2] [ref=f8e36]
      - paragraph [ref=f8e37]: Si el proyecto se usa por menores de edad, debe hacerse bajo supervisión de una persona adulta cuando sea necesario y respetando las leyes aplicables en cada jurisdicción.
      - heading "10. Cambios" [level=2] [ref=f8e38]
      - paragraph [ref=f8e39]: Podemos actualizar esta política para reflejar cambios técnicos, legales o de producto. La versión publicada aquí será la referencia principal.
