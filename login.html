<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Better Discovery</title>
  <meta name="description" content="Inicia sesión para usar Better Discovery.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      min-height: calc(100vh - 60px);
      display: grid;
      place-items: center;
      padding: 32px 20px 48px;
    }

    .auth-card {
      width: min(100%, 460px);
      background: linear-gradient(180deg, rgba(33,33,40,0.96) 0%, rgba(23,23,28,0.96) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .auth-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .auth-card h1 {
      font-size: 2rem;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .auth-card p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .auth-note {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 16px;
    }

    .auth-switch {
      margin-top: 10px;
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font: inherit;
      padding: 0;
    }

    .auth-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .auth-status {
      min-height: 1.2em;
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">🚀 Better Discovery</a>
    <div class="nav-links">
      <a href="about.html">Acerca de</a>
    </div>
  </nav>

  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-kicker">🔐 Acceso privado</div>
      <h1 id="authTitle">Inicia sesión</h1>
      <p id="authSubtitle">Entra con tu cuenta para explorar y publicar creaciones.</p>

      <form id="authForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input id="email" class="form-input" type="email" placeholder="tu@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input id="password" class="form-input" type="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="auth-actions">
          <button type="submit" id="submitBtn" class="btn btn-primary">Entrar</button>
          <button type="button" id="modeToggle" class="btn btn-outline">Crear cuenta</button>
        </div>

        <div id="authStatus" class="auth-status"></div>
      </form>

      <div class="auth-note">
        Al continuar aceptas nuestros terminos y condiciones.
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    let mode = 'login';

    function setMode(nextMode) {
      mode = nextMode;
      const isLogin = mode === 'login';
      document.getElementById('authTitle').textContent = isLogin ? 'Inicia sesión' : 'Crea tu cuenta';
      document.getElementById('authSubtitle').textContent = isLogin
        ? 'Entra con tu cuenta para explorar y publicar creaciones.'
        : 'Crea una cuenta nueva para empezar a usar Better Discovery.';
      document.getElementById('submitBtn').textContent = isLogin ? 'Entrar' : 'Registrarme';
      document.getElementById('modeToggle').textContent = isLogin ? 'Crear cuenta' : 'Ya tengo cuenta';
      document.getElementById('password').autocomplete = isLogin ? 'current-password' : 'new-password';
    }

    async function bootstrap() {
      if (!IS_CONFIGURED) {
        showToast('La app no está configurada.', 'error');
        document.getElementById('authStatus').textContent = 'Configura Supabase en js/config.js.';
        return;
      }

      const { data } = await supabaseClient.auth.getSession();
      if (data?.session) {
        window.location.replace('index.html');
        return;
      }

      document.getElementById('modeToggle').addEventListener('click', () => {
        setMode(mode === 'login' ? 'signup' : 'login');
      });

      document.getElementById('authForm').addEventListener('submit', async e => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const status = document.getElementById('authStatus');
        const btn = document.getElementById('submitBtn');

        if (!email || !password) {
          showToast('Completa email y contraseña.', 'error');
          return;
        }

        btn.disabled = true;
        status.textContent = mode === 'login' ? 'Iniciando sesión…' : 'Creando cuenta…';

        try {
          if (mode === 'login') {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
          } else {
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
          }

          const { data: sessionData } = await supabaseClient.auth.getSession();
          if (sessionData?.session) {
            window.location.replace('index.html');
            return;
          }

          status.textContent = 'Revisa tu correo para confirmar la cuenta.';
          showToast('Revisa tu correo para terminar el acceso.', 'success', 6000);
        } catch (err) {
          status.textContent = err.message;
          showToast(err.message, 'error', 6000);
        } finally {
          btn.disabled = false;
        }
      });
    }

    setMode('login');
    bootstrap();
  </script>
</body>
</html>
