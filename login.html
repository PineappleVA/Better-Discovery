<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Better Discovery</title>
  <meta name="description" content="Inicia sesión para usar Better Discovery.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      min-height: calc(100vh - 60px);
      display: grid;
      place-items: center;
      padding: 32px 20px 48px;
      animation: fadeUp .4s ease both;
    }
    .auth-card {
      width: min(100%, 460px);
      background: linear-gradient(180deg, rgba(33,33,40,.97) 0, rgba(23,23,28,.97) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
    }
    .auth-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: .82rem;
      color: var(--accent);
      margin-bottom: 14px;
      font-weight: 500;
    }
    .auth-card h1 {
      font-size: 2rem;
      letter-spacing: -.03em;
      margin-bottom: 10px;
    }
    .auth-card p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 22px;
    }
    .auth-note {
      font-size: .82rem;
      color: var(--text-muted);
      margin-top: 16px;
    }
    .auth-switch {
      margin-top: 10px;
      background: 0 0;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font: inherit;
      padding: 0;
    }
    .auth-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .auth-status {
      min-height: 1.2em;
      margin-top: 14px;
      color: var(--text-muted);
      font-size: .85rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">🚀 Better Discovery</a>
    <div class="nav-links">
      <a href="docs/about.html">Acerca de</a>
    </div>
    <div class="nav-auth" id="navAuth"></div>
  </nav>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-kicker">🔐 Acceso privado</div>
      <h1 id="authTitle">Inicia sesión</h1>
      <p id="authSubtitle">Entra con tu cuenta para explorar y publicar creaciones.</p>
      <form id="authForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input id="email" class="form-input" type="email" placeholder="tu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input id="password" class="form-input" type="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="auth-actions">
          <button type="submit" class="btn btn-primary" id="authSubmitBtn">Entrar</button>
          <button type="button" class="auth-switch" id="authSwitchBtn">¿No tienes cuenta? Regístrate</button>
        </div>
        <div class="auth-status" id="authStatus"></div>
      </form>
    </section>
  </main>
  <footer class="site-footer">
    <a href="docs/terms.html">Términos y condiciones</a>
    <span>·</span>
    <a href="docs/privacy.html">Política de privacidad</a>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const authForm = document.getElementById('authForm');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const authSwitchBtn = document.getElementById('authSwitchBtn');
    const authStatus = document.getElementById('authStatus');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    let mode = 'login';
    function setMode(next) {
      mode = next;
      if (mode === 'login') {
        authTitle.textContent = 'Inicia sesión';
        authSubtitle.textContent = 'Entra con tu cuenta para explorar y publicar creaciones.';
        authSubmitBtn.textContent = 'Entrar';
        authSwitchBtn.textContent = '¿No tienes cuenta? Regístrate';
      } else {
        authTitle.textContent = 'Crear cuenta';
        authSubtitle.textContent = 'Regístrate para publicar y guardar tus creaciones.';
        authSubmitBtn.textContent = 'Registrarme';
        authSwitchBtn.textContent = '¿Ya tienes cuenta? Inicia sesión';
      }
      authStatus.textContent = '';
    }
    authSwitchBtn.addEventListener('click', () => setMode(mode === 'login' ? 'register' : 'login'));
    async function submitAuth() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) {
        authStatus.textContent = 'Completa el email y la contraseña.';
        return;
      }
      authStatus.textContent = mode === 'login' ? 'Entrando…' : 'Creando cuenta…';
      authSubmitBtn.disabled = true;
      try {
        if (mode === 'login') {
          const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;
          window.location.replace('/index.html');
          return;
        } else {
          const { data, error } = await supabaseClient.auth.signUp({ email, password });
          if (error) throw error;
          authStatus.textContent = 'Revisa tu email para confirmar la cuenta.';
          setMode('login');
        }
      } catch (err) {
        authStatus.textContent = err.message || 'No se pudo completar la acción.';
      } finally {
        authSubmitBtn.disabled = false;
      }
    }
    authForm.addEventListener('submit', e => {
      e.preventDefault();
      submitAuth();
    });
    async function initPage() {
      await requireAuth({ redirect: false });
      await renderAuthNav();
      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (sessionData?.session) {
        window.location.replace('index.html');
        return;
      }
    }
    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
